name: Bug Report
description: Report a bug in DockScope
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: DockScope Version
      placeholder: e.g. 0.2.5
    validations:
      required: true

  - type: input
    id: docker-version
    attributes:
      label: Docker Version
      placeholder: e.g. 24.0.7

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows (WSL)
        - Windows
        - Other

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste any relevant console output or screenshots

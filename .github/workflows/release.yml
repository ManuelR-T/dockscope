name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.github/**'
      - '.prettierrc'
      - 'eslint.config.js'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Version Bump & Publish
    runs-on: ubuntu-latest
    # Only run if the commit message doesn't already contain a version bump
    if: "!contains(github.event.head_commit.message, 'chore: release')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      # Validate commit messages + lint + build
      - name: Validate last commit
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            npx commitlint --from HEAD~1 --to HEAD --verbose
          else
            echo "${{ github.event.head_commit.message }}" | npx commitlint --verbose
          fi
      - run: npm run format:check
      - run: npm run lint
      - run: npm run build

      # Determine version bump from commit messages
      # feat: -> minor, fix: -> patch, BREAKING CHANGE -> major
      - name: Determine version bump
        id: bump
        run: |
          if git describe --tags --abbrev=0 >/dev/null 2>&1; then
            LAST_TAG=$(git describe --tags --abbrev=0)
            COMMITS=$(git log ${LAST_TAG}..HEAD --oneline)
          else
            COMMITS=$(git log --oneline)
          fi

          if echo "$COMMITS" | grep -qiE "BREAKING CHANGE|^.+!:"; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$COMMITS" | grep -qiE "^feat"; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        id: version
        run: |
          NEW_VERSION=$(npm version ${{ steps.bump.outputs.type }} --no-git-tag-version)
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped to $NEW_VERSION (${{ steps.bump.outputs.type }})"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: release ${{ steps.version.outputs.version }}"
          git tag ${{ steps.version.outputs.version }}
          git push origin main --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
